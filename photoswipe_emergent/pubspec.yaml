name: photoswipe_emergent
description: A Tinder-style gallery cleaner app. Swipe right to keep, swipe left to delete.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # iOS Icons
  cupertino_icons: ^1.0.6
  
  # Photo Library Access
  photo_manager: ^3.0.0
  
  # Permissions
  permission_handler: ^11.3.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_card_swiper: ^7.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # Assets (add your app icon here)
  # assets:
  #   - assets/images/
